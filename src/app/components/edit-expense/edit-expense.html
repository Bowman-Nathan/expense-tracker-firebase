<h2 class="mb-4">Edit Expense</h2>

<mat-card>
  <mat-card-content>
    <div class="expense-form">
      <mat-form-field appearance="outline">
        <mat-label>Title</mat-label>
        <input matInput [(ngModel)]="title" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Amount</mat-label>
        <input matInput type="number" [(ngModel)]="amount" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Type</mat-label>
        <mat-select [(ngModel)]="type">
          <mat-option value="Expense">Expense</mat-option>
          <mat-option value="Income">Income</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Date</mat-label>
        <input matInput type="date" [(ngModel)]="date" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Category</mat-label>
        <mat-select [(ngModel)]="category">
          <mat-option value="Work">Work</mat-option>
          <mat-option value="Personal">Personal</mat-option>
          <mat-option value="Grocery">Grocery</mat-option>
          <mat-option value="Utilities">Utilities</mat-option>
          <mat-option value="Shopping">Shopping</mat-option>
          <mat-option value="Travel">Travel</mat-option>
          <mat-option value="Food">Food</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Notes</mat-label>
        <textarea matInput rows="3" [(ngModel)]="notes"></textarea>
      </mat-form-field>

      <button mat-raised-button color="primary" (click)="saveExpense()">Save Changes</button>
    </div>
  </mat-card-content>
</mat-card>
