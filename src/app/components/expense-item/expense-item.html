<div
  class="card mb-3 p-3"
  [class.border-danger]="expense.amount >= 1000"
  [style.backgroundColor]="expense.category === 'Food' ? '#fff3cd' : 'White'"
>
  <h5>{{ expense.title }}</h5>
  <p>Amount: ${{ expense.amount.toFixed(2) }}</p>
  <p>Category: {{ expense.category }}</p>

  <div class="d-flex gap-2">
    <button class="btn btn-danger btn-sm" (click)="deleteExpense()">Delete</button>

    <a class="btn btn-warning btn-sm" [routerLink]="['/edit', expense.id]"> Edit </a>
  </div>
</div>
