<h2 class="text-center mb-4">Dashboard</h2>

<div class="row g-3">
  <div class="col-md-6">
    <div class="card text-center p-4 border-primary">
      <h4>Total Expenses</h4>

      <h2 class="text-primary">${{ expenseService.totalExpense().toFixed(2) }}</h2>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card text-center p-4 border-success">
      <h4>Number of Expenses</h4>

      <h2 class="text-success">
        {{ expenseService.transactionCount() }}
      </h2>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card text-center p-4 border-success">
      <h4>Highest Expense</h4>

      <h2 class="text-success">${{ expenseService.highestExpense().toFixed(2) }}</h2>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card text-center p-4 border-success">
      <h4>Average Expense</h4>

      <h2 class="text-success">${{ expenseService.averageExpense().toFixed(2) }}</h2>
    </div>
  </div>
</div>
