<h2 class="text-center mb-4">Dashboard</h2>

<div class="dashboard-grid">
  <mat-card class="dashboard-card">
    <mat-card-title>Total Expenses</mat-card-title>

    <mat-card-content>
      <h2 class="amount text-primary">${{ expenseService.totalExpense().toFixed(2) }}</h2>
    </mat-card-content>
  </mat-card>

  <mat-card class="dashboard-card">
    <mat-card-title>Number of Expenses</mat-card-title>

    <mat-card-content>
      <h2 class="amount text-success">
        {{ expenseService.transactionCount() }}
      </h2>
    </mat-card-content>
  </mat-card>

  <mat-card class="dashboard-card">
    <mat-card-title>Highest Expense</mat-card-title>

    <mat-card-content>
      <h2 class="amount text-danger">${{ expenseService.highestExpense().toFixed(2) }}</h2>
    </mat-card-content>
  </mat-card>

  <mat-card class="dashboard-card">
    <mat-card-title>Average Expense</mat-card-title>

    <mat-card-content>
      <h2 class="amount text-warning">${{ expenseService.averageExpense().toFixed(2) }}</h2>
    </mat-card-content>
  </mat-card>
</div>
